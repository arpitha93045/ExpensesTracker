version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: expense-tracker-db
    environment:
      POSTGRES_DB: expense_tracker
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_user -d expense_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: expense-tracker-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: expense_tracker
      DB_USERNAME: expense_user
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-very-long-secret-at-least-256-bits-long}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      STORAGE_PATH: /var/app/uploads
      CORS_ORIGINS: http://localhost,http://localhost:4200
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@expensetracker.com}
      NOTIFICATIONS_ENABLED: ${NOTIFICATIONS_ENABLED:-false}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
    volumes:
      - uploads_data:/var/app/uploads
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./expense-tracker-ui
      dockerfile: Dockerfile.frontend
    container_name: expense-tracker-ui
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
