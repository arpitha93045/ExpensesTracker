name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: expense_tracker_test
          POSTGRES_USER: expense_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        run: mvn test -B
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: expense_tracker_test
          DB_USERNAME: expense_user
          DB_PASSWORD: test_password
          JWT_SECRET: test-secret-that-is-long-enough-for-jwt-256-bits

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: target/surefire-reports/

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: expense-tracker-ui/package-lock.json

      - name: Install dependencies
        working-directory: expense-tracker-ui
        run: npm ci

      - name: Build production bundle
        working-directory: expense-tracker-ui
        run: npm run build:prod

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t expense-tracker-api:${{ github.sha }} .

      - name: Build frontend image
        working-directory: expense-tracker-ui
        run: docker build -f Dockerfile.frontend -t expense-tracker-ui:${{ github.sha }} .
